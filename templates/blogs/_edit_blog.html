<div class="card-header">
  <div>
    <h2 class="card-title">Edit post</h2>
    <p class="card-subtitle">Last updated <time data-utc="{{ blog.updated_at }}"></time></p>
  </div>
  <button type="button" class="btn-ghost" onclick="closeModal()">&times;</button>
</div>

<form hx-patch="/blogs/{{ blog.id }}" hx-swap="none" class="card-body space-y-4">
  <label class="block">
    <span class="label">Title</span>
    <input type="text" name="title" class="input mt-1" required maxlength="200" value="{{ blog.title }}" />
  </label>

  <label class="block">
    <span class="label">Cover image URL <span class="text-xs text-gray-400">(optional)</span></span>
    <input type="url" name="image_url" class="input mt-1" maxlength="2000" value="{{ blog.image_url }}" />
  </label>

  <label class="block">
    <span class="label">Content <span class="text-xs text-gray-400">(Markdown)</span></span>
    <textarea name="content" rows="14" class="input mt-1 font-mono text-sm" required>{{ blog.content.raw() }}</textarea>
  </label>

  <div class="flex justify-between pt-2">
    <button
      type="button"
      hx-delete="/blogs/{{ blog.id }}"
      hx-confirm="Delete “{{ blog.title }}”? This cannot be undone."
      class="btn-danger"
    >Delete</button>
    <button type="submit" class="btn-primary">Save</button>
  </div>
</form>
