{% extends "_layouts/base.html" %}

{% block content %}
  <div class="card">
    <div class="card-body text-center">
      <h1 class="page-title">{{ shared.app_name }}</h1>
      <p class="mt-2 page-subtitle">A full-stack template at the heart of every Bytebury application.</p>

      {% match shared.user %}
        {% when Some with (user) %}
          <p class="mt-6 text-gray-700">Signed in as <strong>{{ user.full_name }}</strong></p>
        {% when None %}
          <a href="/auth/google" class="btn-primary mt-6">Sign in with Google</a>
      {% endmatch %}
    </div>
  </div>
{% endblock %}
